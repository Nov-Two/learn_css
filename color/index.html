<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>font & color</title>
  </head>

  <style>
    h1 {
      color: rgba(255, 0, 0, 0.5);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 100px;
      font-weight: 900;
      font-style: italic; /* 斜体 */
      text-align: center;
      text-shadow: -10px -10px 2px rgba(0, 0, 0, 0.5);
      /* text-transform: uppercase; 大写 */
      /*  text-transform: lowercase;小写 */
      text-transform: capitalize; /* 首字母大写 */
      text-decoration: underline; /* 下划线 */
      text-decoration-color: rgba(0, 0, 0, 0.5); /* 下划线颜色 */
      text-decoration-thickness: 10px; /* 下划线厚度 */
      text-decoration-style: solid; /* 下划线样式 */
      text-decoration-skip-ink: none; /* 下划线跳过 */
      text-decoration-skip-ink: auto; /* 下划线跳过 */
    }

    .glitch-text {
      color: #fff; /* 本体：白色 */
      font-size: 60px;
      font-weight: bold;
      text-align: center;

      /* 红色阴影向左上，蓝色阴影向右下 */
      text-shadow:
        -2px -2px 0px #ff0000,
        2px 2px 0px #00ffff;
    }
  </style>
  <body>
    <h1>Hello World</h1>

    <div class="glitch-text">Hello World</div>
  </body>
</html>

<script>
  /*
  font-style: italic;  斜体 
  font-weight: 900;  粗体

  text-shadow: 文字阴影 水平偏移 垂直偏移 模糊距离 颜色

  text-transform: uppercase; 大写
  text-transform: lowercase; 小写
  text-transform: capitalize; 首字母大写


  text-decoration: underline; 下划线
  text-decoration: line-through; 删除线
  text-decoration: overline; 上划线
  text-decoration: none; 无下划线
  text-decoration: dotted; 点线
  text-decoration: dashed; 虚线
  text-decoration: solid; 实线
  text-decoration: double; 双线
  text-decoration: groove; 沟线

  text-decoration-color: rgba(0, 0, 0, 0.5); 下划线颜色
  text-decoration-thickness: 10px; 下划线厚度
  text-decoration-style: solid; 下划线样式
  text-decoration-skip-ink: none; 下划线跳过


  rgba() red green blue opacity
  opacity 0 完全透明
  opacity 1 不透明
   */
</script>
