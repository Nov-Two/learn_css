<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>background-image</title>

    <style>
      .bg--image {
        width: 100%;
        height: 60vh;

        background-image: url("../assets/carton.png");
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: scroll;

        opacity: 0.9;
        filter: blur(1px);

        background-color: rgba(0, 0, 0, 0.5);

        /* background-image: linear-gradient(to right, #000000, #ffffff); */
      }
    </style>
  </head>
  <body>
    <div class="bg--image"></div>
  </body>

  <script>
    /*
    background-image：url(图片路径) 背景图片
    background-size：cover 背景图片大小 cover 覆盖整个容器
    background-size：contain 背景图片大小 contain 包含整个容器  
    background-position：center 背景图片位置 center 居中
    background-position：top 背景图片位置 top 顶部
    background-position：bottom 背景图片位置 bottom 底部
    background-position：left 背景图片位置 left 左侧
    background-position：right 背景图片位置 right 右侧
    background-repeat：no-repeat 背景图片不重复
    background-repeat：repeat 背景图片重复
    background-repeat：repeat-x 背景图片水平重复
    background-repeat：repeat-y 背景图片垂直重复
    

    background-color：red 背景颜色 
    background-image 支持URL路径的图片 还 支持渐变背景

    opacity：0.5 透明度 0 完全透明 1 不透明

    filter：blur(10px) 模糊 0 不模糊 10px 模糊10px
    */
  </script>
</html>
